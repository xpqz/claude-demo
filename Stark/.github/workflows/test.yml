name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: dyalog/dyalog:20.0
      options: --user root

    steps:
      - name: Install Node.js
        run: |
          apt-get update && apt-get install -y nodejs

      - uses: actions/checkout@v4

      - name: Run tests
        run: cd Tests && dyalogscript RunTests.apls
